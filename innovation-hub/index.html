/* ===== system.css (inlined) ===== */
/* ============================================================
   CALM INTELLIGENCE — design system for an AI Chief of Staff
   Premium · Executive · Minimal · High-signal · Trustworthy
   Bloomberg Terminal × Apple · Linear × Perplexity
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');

:root {
  /* — Type — */
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --serif: 'Instrument Serif', Georgia, 'Times New Roman', serif;
  --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* — Signal palette (calm, earthy — never neon) — */
  --teal:        #0F7682;   /* intelligence / AI / primary action */
  --teal-deep:   #0A5A64;
  --teal-soft:   #E2F0F0;
  --clay:        #B24A38;   /* critical / risk */
  --clay-soft:   #F6E6E1;
  --ochre:       #A8782A;   /* caution / at-risk / pending */
  --ochre-soft:  #F5ECD9;
  --sage:        #4E7C5C;   /* on-track / approved / positive */
  --sage-soft:   #E4EEE6;
  --iris:        #4B4F86;   /* decisions / scheduling */
  --iris-soft:   #E9E9F2;

  /* — Light (paper) surface — */
  --paper:       #F4F2EC;   /* warm editorial paper */
  --surface:     #FFFFFF;
  --surface-2:   #FAF8F3;
  --surface-3:   #EFEBE2;
  --ink:         #1B1C1F;
  --ink-2:       #5C5E66;
  --ink-3:       #93949C;
  --hairline:    rgba(27,28,31,0.085);
  --hairline-2:  rgba(27,28,31,0.05);

  /* — Dark (cockpit) surface — */
  --d-bg:        #0C0E11;
  --d-surface:   #15181D;
  --d-surface-2: #1B1F26;
  --d-surface-3: #232831;
  --d-ink:       #F1F2F4;
  --d-ink-2:     #9DA2AC;
  --d-ink-3:     #686D77;
  --d-hairline:  rgba(255,255,255,0.08);
  --d-teal:      #3FB6C2;
  --d-clay:      #E0775F;
  --d-ochre:     #DBA94A;
  --d-sage:      #6FB389;

  /* — Geometry — */
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
  --shadow-card: 0 1px 2px rgba(27,28,31,0.04), 0 6px 18px rgba(27,28,31,0.05);
  --shadow-lift: 0 2px 8px rgba(27,28,31,0.06), 0 18px 40px rgba(27,28,31,0.10);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* tabular figures for all data */
.tnum { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }

/* hide scrollbars inside phones for clean capture */
.noscroll::-webkit-scrollbar { width: 0; height: 0; }
.noscroll { scrollbar-width: none; }

/* subtle entrance */
@keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes pulseRing {
  0% { box-shadow: 0 0 0 0 rgba(15,118,130,0.30); }
  70% { box-shadow: 0 0 0 14px rgba(15,118,130,0); }
  100% { box-shadow: 0 0 0 0 rgba(15,118,130,0); }
}
@keyframes breathe { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
@keyframes slideUp { from { transform: translateY(101%); } to { transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { 0% { transform: scale(0.78); } 60% { transform: scale(1.05); } 100% { transform: scale(1); } }

</style>

/* ===== frames/ios-frame.jsx (inlined) ===== */

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>

}

Object.assign(window, {

<script type="text/babel">
/* ===== proto-store.jsx (inlined) ===== */
/* PROTO STORE — shared live state: resolutions, attention score, timeline,
   day-narrative phase. Plus AttentionRing + SwipeCard + Timeline view. */

// each decision Emma can clear → score weight + the timeline event it writes
const DECISIONS = {
  northwind: { points:8,  event:{ time:'8:42', title:'Northwind conflict resolved', detail:'Working session moved to 13:30, after the QBR', tone:'ok' } },
  snowflake: { points:12, event:{ time:'9:15', title:'Snowflake expansion approved', detail:'$128K override logged · Project Atlas unblocked', tone:'ok' } },
  sarah:     { points:9,  event:{ time:'9:30', title:'Mobile Relaunch risk addressed', detail:'Auth ship-blocker reassigned to Sarah in 1:1', tone:'ok' } },
  hiring:    { points:7,  event:{ time:'9:48', title:'Sr. PM requisition approved', detail:'Panel cleared to proceed at 16:30', tone:'ok' } },
};
const DECISION_KEYS = Object.keys(DECISIONS);
const BASE_SCORE = 60; // 2 missed check-ins already weighing it down; climbs to 96 when clear

const Store = (function () {
  const initial = () => ({
    resolved: {},   // key -> { action, label }
    timeline: [
      { time:'7:00', title:'Day modelled overnight', detail:'Calendar, email, ERP, monday.com & Odoo synced', tone:'info' },
      { time:'8:00', title:'Morning briefing delivered', detail:'3 decisions · 2 at-risk projects · 1 escalation', tone:'info' },
    ],
  });
  let state = initial();
  const subs = new Set();
  const emit = () => subs.forEach(f => f());
  return {
    get: () => state,
    resolve(key, info = {}) {
      if (!DECISIONS[key] || state.resolved[key]) return;
      const ev = { ...DECISIONS[key].event, ...(info.eventOverride||{}) };
      state = { ...state, resolved:{ ...state.resolved, [key]:info }, timeline:[ ...state.timeline, ev ] };
      emit();
    },
    reset() { state = initial(); emit(); },
    score() {
      const pts = Object.keys(state.resolved).reduce((s,k)=> s + (DECISIONS[k]?.points||0), 0);
      return Math.min(100, BASE_SCORE + pts);
    },
    cleared() { return DECISION_KEYS.every(k => state.resolved[k]); },
    countResolved() { return DECISION_KEYS.filter(k => state.resolved[k]).length; },
    phase() {
      const n = this.countResolved();
      return n >= 4 ? 'clear' : n >= 2 ? 'midday' : 'morning';
    },
  };
})();

function useStore() {
  const [, force] = React.useState(0);
  React.useEffect(() => {
    const f = () => force(x => x + 1);
    const set = (Store.__set || (Store.__set = new Set()));
    set.add(f);
    return () => set.delete(f);
  }, []);
  return Store.get();
}
// wire mutations to notify subscribers
(function(){
  const origResolve = Store.resolve.bind(Store);
  const origReset = Store.reset.bind(Store);
  const fire = () => (Store.__set || new Set()).forEach(f => f());
  Store.resolve = (...a) => { origResolve(...a); fire(); };
  Store.reset = (...a) => { origReset(...a); fire(); };
})();

// ── Attention Score ring
function AttentionRing({ score, size=78, stroke=7 }) {
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-score/100);
  const col = score>=90 ? D.sage : score>=75 ? D.teal : score>=65 ? D.ochre : D.clay;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--d-surface-3)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} />
      <text x="50%" y="49%" textAnchor="middle" dominantBaseline="middle" style={{ fontFamily:'var(--mono)', fontSize:size*0.3, fontWeight:600, fill:'var(--d-ink)' }} className="tnum">{score}</text>
      <text x="50%" y="68%" textAnchor="middle" dominantBaseline="middle" style={{ fontFamily:'var(--mono)', fontSize:size*0.12, fill:'var(--d-ink-3)', letterSpacing:0.5 }}>/100</text>
    </svg>
  );
}

// ── Swipe-to-act card
function SwipeCard({ onRight, onLeft, onLong, rightLabel='Approve', leftLabel='Clarify', rightColor=D.sage, leftColor=D.ochre, children, radius=16 }) {
  const [dx, setDx] = React.useState(0);
  const [gone, setGone] = React.useState(0);
  const ref = React.useRef({ down:false, x0:0, moved:false, t:null });
  const TH = 88;
  const down = (e) => {
    const x = e.clientX ?? (e.touches && e.touches[0].clientX);
    ref.current = { down:true, x0:x, moved:false, dx:0, t:setTimeout(()=>{ if(!ref.current.moved){ ref.current.down=false; onLong && onLong(); } }, 550) };
  };
  const move = (e) => {
    if (!ref.current.down) return;
    const x = e.clientX ?? (e.touches && e.touches[0].clientX);
    const d = x - ref.current.x0;
    if (Math.abs(d) > 5) { ref.current.moved = true; clearTimeout(ref.current.t); }
    ref.current.dx = d;
    setDx(d);
  };
  const up = () => {
    const wasDown = ref.current.down;
    const d = ref.current.dx || 0;
    ref.current.down = false; clearTimeout(ref.current.t);
    if (!wasDown) return;
    if (d > TH) { setGone(1); setTimeout(()=> onRight && onRight(), 200); }
    else if (d < -TH) { setGone(-1); setTimeout(()=> onLeft && onLeft(), 200); }
    else setDx(0);
  };
  const reveal = dx > 4 ? 'right' : dx < -4 ? 'left' : null;
  const tx = gone ? gone*420 : dx;
  return (
    <div style={{ position:'relative', borderRadius:radius, overflow:'hidden' }}>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent: reveal==='right'?'flex-start':'flex-end', padding:'0 18px',
        background: reveal==='right' ? 'color-mix(in oklab, '+rightColor+' 22%, var(--d-bg))' : reveal==='left' ? 'color-mix(in oklab, '+leftColor+' 22%, var(--d-bg))' : 'var(--d-bg)' }}>
        {reveal && <span style={{ ...D.mono, fontSize:11, fontWeight:600, letterSpacing:0.8, textTransform:'uppercase', color: reveal==='right'?rightColor:leftColor, display:'flex', alignItems:'center', gap:7 }}>
          {reveal==='right' ? <><I.check size={16}/>{rightLabel}</> : <>{leftLabel}<I.chevR size={16}/></>}
        </span>}
      </div>
      <div onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerLeave={up}
        style={{ position:'relative', transform:`translateX(${tx}px)`, transition: ref.current.down?'none':'transform .26s cubic-bezier(.22,.61,.36,1)', opacity: gone?0:1, touchAction:'pan-y', cursor:'grab' }}>
        {children}
      </div>
    </div>
  );
}

// ── Timeline view (Attention → Decision → Execution → Outcome)
function TimelineView() {
  const s = useStore();
  const tone = { info:D.ink3, ok:D.sage, risk:D.clay };
  const score = Store.score();
  return (
    <Screen eyebrow="Today" title="Mission log"
      trailing={<span style={{ ...D.mono, fontSize:11, color: score>=90?D.sage:D.teal }}>{score}/100</span>}>
      <div style={{ padding:'16px 18px 4px' }}>
        <div style={{ display:'flex', gap:8, padding:'12px 14px', background:D.surface, border:'1px solid '+D.line, borderRadius:'var(--r-md)' }}>
          <span style={{ color:D.teal, marginTop:1 }}><I.spark size={15} /></span>
          <span style={{ fontSize:13, color:D.ink2, lineHeight:1.4 }}>
            {Store.cleared()
              ? <>You cleared every critical item today. <b style={{ color:D.ink }}>Launch risk reduced from High to Medium.</b></>
              : <>{Store.countResolved()} of 4 decisions handled. I’m tracking the rest and will resurface them.</>}
          </span>
        </div>
      </div>
      <div style={{ padding:'20px 18px 28px' }}>
        {s.timeline.map((e,i)=>(
          <div key={i} style={{ display:'flex', gap:13 }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
              <span className="tnum" style={{ ...D.mono, fontSize:10.5, color:D.ink3, marginBottom:6, width:34, textAlign:'right' }}>{e.time}</span>
              <div style={{ width:11, height:11, borderRadius:99, background:tone[e.tone]||D.ink3, border:'2px solid var(--d-bg)', boxShadow:'0 0 0 1px '+(tone[e.tone]||D.ink3), flexShrink:0 }} />
              {i<s.timeline.length-1 && <div style={{ width:2, flex:1, minHeight:26, background:D.line, margin:'3px 0' }} />}
            </div>
            <div style={{ paddingBottom:20, marginTop:-2, flex:1 }}>
              <div style={{ fontSize:14, fontWeight:550, color:D.ink }}>{e.title}</div>
              <div style={{ fontSize:12.5, color:D.ink3, marginTop:2, lineHeight:1.4 }}>{e.detail}</div>
            </div>
          </div>
        ))}
        {!Store.cleared() && <div style={{ ...D.mono, fontSize:11, color:D.ink3, textAlign:'center', paddingTop:4 }}>· tracking {4-Store.countResolved()} open item{4-Store.countResolved()===1?'':'s'} ·</div>}
      </div>
    </Screen>
  );
}

Object.assign(window, { Store, useStore, DECISIONS, DECISION_KEYS, AttentionRing, SwipeCard, TimelineView });

</script>
<script type="text/babel">
/* ===== proto-approval.jsx (inlined) ===== */
/* FLOW 1 — Approval Intelligence
   Queue list + decision detail: request, amount, policy, recommendation, risk,
   impact, budget, document. Actions: Approve / Reject / Clarify / Delegate,
   with explicit confirmation for exceptions, ERP write-back + audit log. */

const POL_D = {
  within:{ c:'var(--d-sage)', label:'Within policy' },
  exception:{ c:'var(--d-clay)', label:'Policy exception' },
  flag:{ c:'var(--d-ochre)', label:'Needs clarity' },
  decision:{ c:'#8E93D6', label:'Your decision' },
};

function ApprovalList() {
  const E = window.EMMA;
  return (
    <Screen eyebrow="Approval queue" title="Approvals" trailing={<span style={{ ...D.mono, fontSize:11, color:D.ink3 }}>12</span>}>

        </div>
      </div>
      <Block label="Needs your decision" pad>
        {E.approvals.filter(a=>a.policy!=='within').map((a,i,arr)=><ApprovalRow key={a.id} a={a} last={i===arr.length-1} />)}
      </Block>
      <Block label="Recommended: approve" pad right={<span style={{ ...D.mono, fontSize:10, color:D.sage }}>WITHIN POLICY</span>}>
        {E.approvals.filter(a=>a.policy==='within').map((a,i,arr)=><ApprovalRow key={a.id} a={a} last={i===arr.length-1} />)}
      </Block>
      <div style={{ height:24 }} />
    </Screen>
  );
}

function ApprovalRow({ a, last }) {
  const p = POL_D[a.policy];
  return (
    <div onClick={()=>nav().go('approvalDetail',{ id:a.id })} style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 15px', borderBottom: last?'none':'1px solid '+D.line, cursor:'pointer' }}>
      <Dot color={p.c} size={8} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:14, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{a.vendor}</div>
        <div style={{ fontSize:11.5, color:D.ink3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{a.purpose}</div>
      </div>
      <div style={{ textAlign:'right' }}>
        {a.amount>0 && <div className="tnum" style={{ ...D.mono, fontSize:13.5, fontWeight:600 }}>{money(a.amount)}</div>}
        <div style={{ ...D.mono, fontSize:9.5, color:p.c, letterSpacing:0.4 }}>{a.rec.toUpperCase()}</div>
      </div>
    </div>
  );
}

function ApprovalDetail({ id }) {
  const E = window.EMMA;
  const a = E.approvals.find(x=>x.id===id);
  const det = E.approvalDetail[id] || { risk:[], budget:null };
  const p = POL_D[a.policy];
  const [done, setDone] = React.useState(null);     // 'approved'|'rejected'|'clarified'|'delegated'
  const [pending, setPending] = React.useState(null);
  const isException = a.policy==='exception';

  const act = (kind) => {
    if ((kind==='approved' && isException)) { setPending(kind); return; }
    setDone(kind);
  };
  const confirm = () => { setDone(pending); setPending(null); };

  if (done) return <ApprovalResult a={a} kind={done} />;

  const sevLabel = { high:'High', med:'Medium', low:'Low' };

  return (
    <Screen eyebrow={`Approval · ${a.cat}`} title={a.vendor}
      footer={
        <div style={{ display:'flex', flexDirection:'column', gap:9 }}>
          <div style={{ display:'flex', gap:9 }}>
            <Btn label="Approve" kind="primary" icon={<I.check size={15} />} onClick={()=>act('approved')} />
            <Btn label="Reject" kind="danger" icon={<I.x size={15} />} onClick={()=>act('rejected')} />
          </div>
          <div style={{ display:'flex', gap:9 }}>
            <Btn label="Clarify" kind="ghost" small onClick={()=>act('clarified')} />
            <Btn label="Delegate" kind="ghost" small onClick={()=>act('delegated')} />
          </div>
        </div>
      }>
      {/* amount header */}
      <div style={{ padding:'20px 18px 4px', textAlign:'center' }}>
        {a.amount>0
          ? <div className="tnum" style={{ ...D.mono, fontSize:42, fontWeight:600, letterSpacing:-1 }}>{money(a.amount)}</div>
          : <div style={{ ...D.mono, fontSize:24, fontWeight:600, color:D.iris }}>DECISION</div>}
        <div style={{ fontSize:13.5, color:D.ink2, marginTop:6 }}>{a.purpose}</div>
        <div style={{ display:'inline-flex', alignItems:'center', gap:6, marginTop:12, padding:'5px 11px', borderRadius:99, background:'color-mix(in oklab, '+p.c+' 14%, transparent)', border:'1px solid color-mix(in oklab, '+p.c+' 32%, transparent)' }}>
          <Dot color={p.c} size={6} /><span style={{ ...D.mono, fontSize:10.5, fontWeight:600, letterSpacing:0.6, color:p.c, textTransform:'uppercase' }}>{p.label}</span>
        </div>
      </div>

      {/* AI recommendation */}
      <Block label="Recommendation">
        <div style={{ padding:'14px 15px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            <span style={{ color:D.teal }}><I.spark size={16} /></span>
            <span style={{ fontSize:15, fontWeight:600 }}>{a.rec}{isException?' — get your sign-off':''}</span>
          </div>
          <div style={{ fontSize:13, color:D.ink2, lineHeight:1.45 }}>{a.reason}</div>
        </div>
      </Block>

      {/* risk */}
      {det.risk && det.risk.length>0 &&
        <Block label="Risk">
          {det.risk.map((r,i,arr)=>(
            <div key={i} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'12px 15px', borderBottom: i===arr.length-1?'none':'1px solid '+D.line }}>
              <span style={{ marginTop:1, color:SEV[r.sev] }}><I.alert size={15} /></span>
              <span style={{ flex:1, fontSize:13, color:D.ink, lineHeight:1.4 }}>{r.t}</span>
              <span style={{ ...D.mono, fontSize:9.5, fontWeight:600, color:SEV[r.sev], marginTop:2 }}>{sevLabel[r.sev].toUpperCase()}</span>
            </div>
          ))}
        </Block>}

      {/* impact + budget */}
      {det.impact &&
        <Block label="Impact">
          <div style={{ padding:'14px 15px' }}>
            <div style={{ fontSize:13, color:D.ink2, lineHeight:1.45 }}>{det.impact}</div>
            {det.budget && <div style={{ marginTop:14 }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:11.5, color:D.ink3, marginBottom:6 }}>
                <span>{det.budget.line}</span><span>{det.budget.of}</span>
              </div>
              <div style={{ height:6, borderRadius:99, background:D.s3, overflow:'hidden' }}>
                <div style={{ width:det.budget.used+'%', height:'100%', borderRadius:99, background: det.budget.used>85?D.clay:D.teal }} />
              </div>
            </div>}
          </div>
        </Block>}

      {/* request meta */}
      <Block label="Request">
        <Row label="Requester" value={a.requester} />
        <Row label="Category" value={a.cat} />
        {det.doc!==undefined && <Row label="Document" value={det.doc ? <span style={{ display:'inline-flex', alignItems:'center', gap:6, color:D.teal }}><I.doc size={14} />{det.doc}</span> : 'Missing'} valColor={det.doc?D.teal:D.clay} />}
        {det.history && <Row label="History" value={det.history} last />}
      </Block>

      {det.similar &&
        <div style={{ padding:'14px 18px 4px' }}>
          <div style={{ display:'flex', gap:8, padding:'11px 13px', background:D.surface, border:'1px solid '+D.line, borderRadius:'var(--r-md)' }}>
            <span style={{ color:D.ink3, marginTop:1 }}><I.clock size={14} /></span>
            <span style={{ fontSize:12, color:D.ink2, lineHeight:1.4 }}>{det.similar}</span>
          </div>
        </div>}

      {/* verbal approval affordance */}
      <div style={{ display:'flex', alignItems:'center', gap:11, margin:'16px 18px 22px', padding:'12px 14px', border:'1px dashed '+D.line, borderRadius:'var(--r-md)' }}>
        <div style={{ width:36, height:36, borderRadius:99, background:D.s3, color:D.teal, display:'flex', alignItems:'center', justifyContent:'center' }}><I.mic size={17} /></div>
        <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:500 }}>Approve by voice</div><div style={{ fontSize:11.5, color:D.ink3 }}>Transcript + identity logged to audit</div></div>
      </div>

      <Sheet open={!!pending} onClose={()=>setPending(null)}>
        <div style={{ textAlign:'center', marginBottom:4 }}>
          <div style={{ color:D.clay, marginBottom:10 }}><I.shield size={30} /></div>
          <div style={{ fontSize:18, fontWeight:600, marginBottom:8 }}>Confirm override</div>
          <div style={{ fontSize:13.5, color:D.ink2, lineHeight:1.45, marginBottom:18 }}>
            This {money(a.amount)} request <b style={{ color:D.ink }}>exceeds your $100K limit</b>. Approving it records an explicit policy override under your name.
          </div>
        </div>
        <div style={{ display:'flex', gap:9 }}>
          <Btn label="Cancel" kind="ghost" onClick={()=>setPending(null)} />
          <Btn label="Override & approve" kind="primary" onClick={confirm} />
        </div>
      </Sheet>
    </Screen>
  );
}

function ApprovalResult({ a, kind }) {
  React.useEffect(() => {
    const key = a.id==='a3' ? 'snowflake' : a.id==='a6' ? 'hiring' : null;
    if (!key) return;
    const over = kind==='approved' ? undefined : {
      ...window.DECISIONS[key].event,
      title: kind==='rejected' ? a.vendor+' rejected' : kind==='clarified' ? 'Clarification requested — '+a.vendor : a.vendor+' delegated to Finance',
      detail: kind==='clarified' ? 'Awaiting requester response' : kind==='rejected' ? 'Requester notified · logged to audit' : 'Routed with your recommendation',
      tone: kind==='rejected' ? 'risk' : 'info',
    };
    window.Store.resolve(key, { action:kind, eventOverride:over });
  }, []);
  const labels = {
    approved:{ c:D.sage, title:'Approved', line:'Decision written back to Odoo. Requester notified.' },
    rejected:{ c:D.clay, title:'Rejected', line:'Requester notified with your note. Logged to audit.' },
    clarified:{ c:D.ochre, title:'Clarification requested', line:'I’ve asked '+a.requester+' for the missing detail and will resurface it.' },
    delegated:{ c:D.iris, title:'Delegated', line:'Routed to Finance with your recommendation attached.' },
  }[kind];
  return (
    <Screen eyebrow={`Approval · ${a.cat}`} title={a.vendor} footer={
      <div style={{ display:'flex', gap:9 }}>
        <Btn label="Back to cockpit" kind="soft" onClick={()=>nav().reset()} />
        <Btn label="Next decision" kind="primary" icon={<I.chevR size={15} />} onClick={()=>nav().go('approvalDetail',{ id:'a6' })} />
      </div>
    }>
      <div style={{ padding:'46px 26px', textAlign:'center' }}>
        <SuccessCheck color={labels.c} />
        <div style={{ fontSize:22, fontWeight:600, letterSpacing:-0.3 }}>{labels.title}</div>
        {a.amount>0 && <div className="tnum" style={{ ...D.mono, fontSize:14, color:D.ink2, marginTop:6 }}>{money(a.amount)} · {a.vendor}</div>}
        <div style={{ fontSize:14, color:D.ink2, lineHeight:1.5, marginTop:16, maxWidth:300, marginLeft:'auto', marginRight:'auto' }}>{labels.line}</div>
        <div style={{ display:'inline-flex', alignItems:'center', gap:7, marginTop:22, padding:'8px 13px', borderRadius:99, background:D.surface, border:'1px solid '+D.line }}>
          <Dot color={D.sage} size={6} /><span style={{ ...D.mono, fontSize:10.5, color:D.ink3, letterSpacing:0.5 }}>AUDIT LOGGED · {new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
        </div>
      </div>
    </Screen>
  );
}

Object.assign(window, { ApprovalList, ApprovalDetail });

</script>
<script type="text/babel">

                  {!a.confirmed && <span style={{ ...D.mono, fontSize:9.5, color:D.ochre, letterSpacing:0.4 }}>· NEEDS OWNER CONFIRM</span>}
                </div>
                <div style={{ fontSize:13.5, color:D.ink, lineHeight:1.4 }}>{a.text}</div>

        </div>
        <div style={{ width:32, height:32, borderRadius:99, background:D.s3, color:D.ink, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11.5, fontWeight:600 }}>{E.user.initials}</div>

        </div>

          <span style={{ color:D.teal, marginTop:1 }}><I.spark size={15} /></span>
          <span style={{ fontSize:13.5, lineHeight:1.4, color:D.ink2 }}>
            {phase==='clear'

        </div>
      </div>

  // attention health summary
  const AttentionCard = () => (
    <div onClick={()=>nav().go('timeline')} style={{ display:'flex', alignItems:'center', gap:15, margin:'16px 18px 0', padding:'13px 16px', background:D.surface, border:'1px solid '+D.line, borderRadius:'var(--r-md)', cursor:'pointer' }}>

  const Toggle = () => (

    <>
      {cleared ? <AllClear /> : <>
      <RiskStrip />

        {[['queue','Decision queue'],['risk','Risk radar'],['today','Today']].map(([k,l])=>(

        {queue.filter(q=>!S.resolved[q.key]).map(q=>(
          <SwipeCard key={q.key} rightLabel={q.rightLabel} leftLabel={q.leftLabel} rightColor={D.sage} leftColor={D.ochre}

      </div>}
      {tab==='risk' && <div style={{ background:D.surface, border:'1px solid '+D.line, borderRadius:'var(--r-md)', margin:'0 18px', overflow:'hidden' }}>
        {E.team.filter(t=>t.status!=='on-track').map((t,i,arr)=><TeamRow key={t.id} t={t} last={i===arr.length-1} />)}
      </div>}
      {tab==='today' && <div style={{ margin:'0 18px' }}>
        {E.schedule.map(m=>(
          <div key={m.id} onClick={()=> m.flag==='escalation' && nav().go('calendarInvite')} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 4px', borderBottom:'1px solid '+D.line, cursor:m.flag==='escalation'?'pointer':'default' }}>
            <span className="tnum" style={{ ...D.mono, fontSize:12, color:D.ink2, width:42 }}>{m.time}</span>
            <div style={{ width:6, height:6, borderRadius:99, background:m.critical?D.clay:D.ink3 }} />

            {m.overrun && <Pill color={D.ochre}>+30m</Pill>}
            {m.flag==='escalation' && <I.chevR size={14} style={{ color:D.ink3 }} />}
          </div>
        ))}
      </div>}
      </>}

      {/* intelligence entries */}
      <div style={{ padding:'22px 18px 0' }}>
        <div style={{ ...D.mono, fontSize:10, fontWeight:600, letterSpacing:1.4, textTransform:'uppercase', color:D.ink3, marginBottom:10 }}>Execute</div>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {intel.map((it,i)=>(
            <div key={i} onClick={it.go} style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 14px', background:D.surface, border:'1px solid '+D.line, borderRadius:'var(--r-md)', cursor:'pointer' }}>
              <span style={{ color:it.c }}>{it.icon}</span>
              <div style={{ flex:1 }}><div style={{ fontSize:14, fontWeight:500 }}>{it.t}</div><div style={{ fontSize:12, color:D.ink3 }}>{it.s}</div></div>
              <I.chevR size={15} style={{ color:D.ink3 }} />

        </div>

  // ── Brief mode (conversational, dark)
  const Beat = ({ children }) => (
    <div style={{ display:'flex', gap:11, padding:'0 18px', marginBottom:20 }}>
      <div style={{ width:28, height:28, borderRadius:99, flexShrink:0, background:'linear-gradient(150deg, var(--d-teal), var(--teal-deep))', color:'#06181B', display:'flex', alignItems:'center', justifyContent:'center' }}><I.spark size={15} sw={1.9} /></div>
      <div style={{ flex:1, paddingTop:2 }}>{children}</div>

  const Chip = ({ label, icon, primary, go }) => (
    <button onClick={go} style={{ ...D.mono, display:'inline-flex', alignItems:'center', gap:6, fontSize:11, fontWeight:600, letterSpacing:0.4, textTransform:'uppercase', padding:'8px 13px', borderRadius:99, cursor:'pointer', border:primary?'none':'1px solid '+D.line, background:primary?D.teal:'transparent', color:primary?'#06181B':D.ink2 }}>{icon}{label}</button>
  );
  const Brief = () => (
    <div style={{ paddingTop:18 }}>
      <Beat><div style={{ fontSize:15.5, lineHeight:1.5, color:D.ink, fontWeight:500 }}>Your day in one breath: <b>three decisions</b> before noon, <b style={{ color:D.clay }}>two projects at risk</b>, first meeting in {E.summary.firstMeetingMins} minutes.</div></Beat>

        <div style={{ fontSize:14, lineHeight:1.5, color:D.ink2, marginBottom:11 }}>First, <b style={{ color:D.ink }}>Northwind is escalating</b> on your 11:00 — and a back-to-back session was just proposed. Resolve the conflict before the call.</div>

      </Beat>
      <Beat>
        <div style={{ fontSize:14, lineHeight:1.5, color:D.ink2, marginBottom:11 }}>Three decisions need you. One exceeds your $100K limit, so I left it for you.</div>

      </Beat>
      <Beat>
        <div style={{ fontSize:14, lineHeight:1.5, color:D.ink2, marginBottom:11 }}><b style={{ color:D.ink }}>Sarah’s plan doesn’t align</b> with her priorities — Mobile Relaunch is at risk. Friday’s meeting also has 4 actions ready to allocate.</div>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}><Chip label="Open risk" primary go={()=>nav().go('teamDetail',{id:'t1'})} /><Chip label="Allocate actions" icon={<I.route size={13} />} go={()=>nav().go('minutes')} /></div>

        <div style={{ fontSize:14, lineHeight:1.5, color:D.ink2, marginBottom:11 }}>Lastly, London in {E.travel.inDays} days — flights unticketed past SLA. I’ve nudged David twice.</div>

  return (
    <div className="noscroll" style={{ position:'absolute', inset:0, overflowY:'auto', overflowX:'hidden', background:D.bg, color:D.ink, paddingBottom:112 }}>
      <Header />
      <AttentionCard />
      <Toggle />
      {mode==='cockpit' ? <Cockpit /> : <Brief />}

      {/* command bar */}
      <div style={{ position:'fixed', display:'none' }} />
      <div style={{ position:'sticky', bottom:18, margin:'24px 18px 0', display:'flex', alignItems:'center', gap:10, padding:'7px 7px 7px 16px', background:'rgba(27,31,38,0.78)', backdropFilter:'blur(16px) saturate(160%)', WebkitBackdropFilter:'blur(16px) saturate(160%)', border:'1px solid '+D.line, borderRadius:12, boxShadow:'0 18px 40px rgba(0,0,0,0.5)' }}>
        <span style={{ ...D.mono, fontSize:12, color:D.ink3, flex:1, letterSpacing:0.4 }}>COMMAND · approve, brief, reschedule…</span>
        <div style={{ width:38, height:38, borderRadius:9, background:D.teal, color:'#06181B', display:'flex', alignItems:'center', justifyContent:'center' }}><I.mic size={18} /></div>
      </div>
    </div>
  );
}
window.Home = Home;

</script>
<script type="text/babel">
/* ===== proto-app.jsx (inlined) ===== */
/* APP SHELL — navigation stack + screen routing, mounted in the iOS frame. */

function renderScreen(entry) {
  const p = entry.props || {};
  switch (entry.screen) {
    case 'approvalList':   return <ApprovalList />;
    case 'approvalDetail': return <ApprovalDetail {...p} />;
    case 'minutes':        return <MinutesDetail />;
    case 'teamList':       return <TeamList />;
    case 'teamDetail':     return <TeamDetail {...p} />;
    case 'calendarInvite': return <CalendarInvite />;
    case 'travel':         return <TravelDetail />;
    case 'timeline':       return <TimelineView />;
    default:               return null;
  }
}

function App() {
  const [stack, setStack] = React.useState([{ screen:'home' }]);
  // expose nav synchronously every render so handlers always resolve
  window.__nav = {
    go:   (screen, props) => setStack(s => [...s, { screen, props }]),
    back: () => setStack(s => s.length > 1 ? s.slice(0, -1) : s),
    reset:() => setStack([{ screen:'home' }]),
  };

  return (
    <div style={{ position:'relative', height:'100%', width:'100%', overflow:'hidden' }}>
      <Home />
      {stack.slice(1).map((e, i) => (
        <div key={i} style={{ position:'absolute', inset:0, zIndex:10 + i }}>{renderScreen(e)}</div>
      ))}
    </div>
  );
}

function Stage() {
  const pill = { display:'inline-flex', alignItems:'center', gap:9, textDecoration:'none', fontSize:13,
    color:'var(--ink-2)', padding:'8px 13px 8px 11px', border:'1px solid var(--hairline)',
    background:'var(--surface)', borderRadius:99 };
  const pillCur = { ...pill, background:'var(--ink)', color:'#fff', borderColor:'var(--ink)' };
  const num = { fontFamily:'var(--mono)', fontSize:10.5, fontWeight:600, width:19, height:19, borderRadius:99,
    display:'grid', placeItems:'center', background:'var(--surface-3)', color:'var(--ink-2)' };
  const numCur = { ...num, background:'rgba(255,255,255,0.16)', color:'#fff' };
  const sub = { color:'var(--ink-3)', fontSize:11 };
  const sep = { width:18, height:1, background:'var(--hairline)', margin:'0 3px' };
  return (
    <div style={{ minHeight:'100vh', background:'#E7E4DD', display:'flex', flexDirection:'column', alignItems:'center', padding:'40px 20px 60px', boxSizing:'border-box' }}>
      <div style={{ textAlign:'center', marginBottom:22, maxWidth:520 }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, fontWeight:600, letterSpacing:2, textTransform:'uppercase', color:'var(--ink-3)', marginBottom:10 }}>AI Chief of Staff · Interactive Prototype</div>
        <div style={{ fontFamily:'var(--serif)', fontSize:34, lineHeight:1, letterSpacing:-0.5, color:'var(--ink)', marginBottom:12 }}>Mission Control</div>
        <div style={{ fontSize:14.5, color:'var(--ink-2)', lineHeight:1.5 }}>
          Live cockpit for Emma Rodriguez, COO. Switch <b style={{ color:'var(--ink)' }}>Cockpit ⁄ Brief</b>, then tap into Approvals, Meeting Minutes, Team Risk, Calendar, and Travel — every flow is interactive.
        </div>
      </div>

      {/* shared breadcrumb stepper across the three pages */}
      <nav style={{ display:'flex', alignItems:'center', flexWrap:'wrap', justifyContent:'center', marginBottom:30 }} aria-label="Where this sits in the deck">
        <a href="AI-Chief-of-Staff-Why-How-Tech.html" style={pill}><span style={num}>1</span> Brief <span style={sub}>why &amp; how</span></a>
        <span style={sep}></span>
        <a href="AI-Chief-of-Staff-Build-Plan.html" style={pill}><span style={num}>2</span> Build plan <span style={sub}>team / scale</span></a>
        <span style={sep}></span>
        <a href="AI-Chief-of-Staff-Lean-Build.html" style={pill}><span style={num}>3</span> Lean V1 <span style={sub}>solo build</span></a>
        <span style={sep}></span>
        <span style={pillCur}><span style={numCur}>4</span> Demo <span style={{ ...sub, color:'rgba(255,255,255,.6)' }}>you are here</span></span>
      </nav>

      <IOSDevice dark><App /></IOSDevice>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);

</script>
</body>
